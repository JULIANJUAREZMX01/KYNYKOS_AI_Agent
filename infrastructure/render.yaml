# KynicOS — render.yaml
# Un servicio, máxima autarquía, deploy en 1 click.

services:
  - type: web
    name: nanobot-cloud
    runtime: python
    plan: free
    region: oregon

    buildCommand: |
      pip install --upgrade pip && \
      pip install poetry && \
      poetry install --only main --no-root

    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

    healthCheckPath: /api/status

    disk:
      name: kynikos-data
      mountPath: /app/data
      sizeGB: 1

    envVars:
      # Identidad
      - key: PERSONA
        value: kynikos

      # Telegram (REQUERIDO)
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_USER_ID
        value: "8247886073"
      - key: TECH_TELEGRAM_CHAT_ID
        sync: false

      # LLM — Groq (REQUERIDO, gratis)
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      # LLM — Fallbacks públicos (TODOS OPCIONALES)
      - key: TOGETHER_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      # Ollama local: no aplica en Render (usar docker-compose local)

      # WhatsApp Evolution (OPCIONAL — solo si usas docker-compose)
      - key: EVOLUTION_API_URL
        value: ""
      - key: EVOLUTION_API_KEY
        value: ""

      # WhatsApp Twilio (OPCIONAL, de pago)
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        value: "+14155238886"

      # Stripe (OPCIONAL, Fase 2)
      - key: STRIPE_SECRET_KEY
        sync: false

      # App
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHONUNBUFFERED
        value: "1"
