# fly.toml — KynicOS / Leo Concierge
# Free tier: 3 shared-cpu-1x VMs, 256MB RAM included
# Deploy: fly deploy (no credit card for hobby tier)

app = "kynikos-leo"
primary_region = "mia"  # Miami — closest to Cancun

[build]
  dockerfile = "infrastructure/Dockerfile"

[env]
  PORT = "8000"
  ENVIRONMENT = "production"
  LOG_LEVEL = "INFO"
  PERSONA = "leo"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
